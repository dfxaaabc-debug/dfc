<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小元 - 你的元气AI助手</title>
    <style>

.message {
  opacity: 0;
  transform: translateY(12px);
  animation: msgPop 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
}
@keyframes msgPop {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.ai-message {
  animation-delay: 0.08s;
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4ecf7 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部标题栏 */
        .header {
            background: #fff;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .header h1 {
            font-size: 22px;
            color: #ff6b81;
            font-weight: 600;
        }
        .header p {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }
        .user-message {
            align-self: flex-end;
            background: #ff6b81;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            align-self: flex-start;
            background: #fff;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        /* 输入框区域 */
        .input-area {
            background: #fff;
            padding: 12px 20px;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-area input:focus {
            border-color: #ff6b81;
        }
        .input-area button {
            padding: 12px 24px;
            background: #ff6b81;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }
        .input-area button:hover {
            background: #ff526b;
        }

        /* 加载动画 */
        .loading {
            display: none;
            align-self: flex-start;
            padding: 12px 16px;
            background: #fff;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .loading span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6b81;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>小元 ✨</h1>
        <p>你的元气AI助手，一直在你身边</p>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message ai-message">
            嗨嗨！我是小元😊 很高兴认识你！今天有什么想聊的吗？
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="和小元聊聊天吧..." />
        <button onclick="sendMessage()">发送</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const loading = document.createElement('div');
        loading.className = 'loading';
        loading.innerHTML = '<span></span><span></span><span></span>';

        // 发送消息
async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;

  // 显示用户消息
  const userMsg = document.createElement('div');
  userMsg.className = 'message user-message';
  userMsg.textContent = text;
  chatContainer.appendChild(userMsg);
  messageInput.value = '';
  chatContainer.scrollTop = chatContainer.scrollHeight;

  // 显示加载动画
  chatContainer.appendChild(loading);
  loading.style.display = 'flex';
  chatContainer.scrollTop = chatContainer.scrollHeight;

  try {
    // 调用后端接口（增加超时控制，避免长时间等待）
    const res = await fetch('http://localhost:3000/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
      signal: AbortSignal.timeout(10000) // 10秒超时，防止卡死
    });
    const data = await res.json();

    // 隐藏加载，显示AI回复
    loading.style.display = 'none';
    const aiMsg = document.createElement('div');
    aiMsg.className = 'message ai-message';
    aiMsg.textContent = data.reply;
    chatContainer.appendChild(aiMsg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  } catch (err) {
    loading.style.display = 'none';
    const errMsg = document.createElement('div');
    errMsg.className = 'message ai-message';
    errMsg.textContent = '💥 网络有点慢，再试一次吧～';
    chatContainer.appendChild(errMsg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }
}

        // 回车发送
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
