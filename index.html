<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto;
    background:#f5f5f7;
    color:#1d1d1f;
    -webkit-font-smoothing:antialiased;
    opacity:0;
    animation:fadeIn 1s ease forwards;
}
@keyframes fadeIn{to{opacity:1}}

/* 扫描线动画 */
.scan-line{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:2px;
    background:linear-gradient(90deg,transparent,#0071e3,transparent);
    z-index:998;
    pointer-events:none;
    animation:scan 4s linear infinite;
    opacity:0.6;
}
@keyframes scan{
    0%{top:-2px}
    100%{top:100vh}
}

/* 按钮呼吸光 */
.btn-pulse{
    animation:pulse 2s infinite;
}
@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(0,113,227,0.3)}
    70%{box-shadow:0 0 0 12px rgba(0,113,227,0)}
    100%{box-shadow:0 0 0 0 rgba(0,113,227,0)}
}

/* 卡片流光 */
.card::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(90deg,transparent,rgba(0,113,227,0.05),transparent);
    transition:0.6s;
}
.card:hover::before{
    left:100%;
}
.card{
    position:relative;
    overflow:hidden;
}

/* ===== 导航栏 ===== */
nav{
    position:fixed;
    top:0;
    width:100%;
    backdrop-filter:blur(20px) saturate(180%);
    background:rgba(255,255,255,0.75);
    border-bottom:1px solid rgba(0,0,0,0.05);
    z-index:999;
    transition:all .4s ease;
}
nav.scrolled{
    height:42px;
    background:rgba(255,255,255,0.9);
}
.nav-container{
    max-width:1100px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    height:48px;
}
.logo{font-weight:600;font-size:18px}
.nav-links a{
    margin-left:28px;
    text-decoration:none;
    font-size:13px;
    color:#444;
    position:relative;
}
.nav-links a::after{
    content:"";
    position:absolute;
    bottom:-4px;
    left:0;
    width:0;
    height:1px;
    background:#0071e3;
    transition:.3s;
}
.nav-links a:hover::after{width:100%}

/* ===== 容器 ===== */
.container{
    max-width:1100px;
    margin:auto;
    padding:140px 20px;
    text-align:center;
}

/* ===== Hero ===== */
.hero h1{
    font-size:110px;
    font-weight:600;
    letter-spacing:-0.05em;
    background:linear-gradient(90deg,#1d1d1f,#6e6e73);
    background-clip:text;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    color:transparent;
}
.hero .sub{
    margin-top:10px;
    font-size:22px;
    color:#6e6e73;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:12px 26px;
    border-radius:999px;
    background:#0071e3;
    color:#fff;
    text-decoration:none;
    font-size:17px;
    transition:.3s;
}
.btn:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,113,227,.3);
}

/* ===== 分屏产品展示 ===== */
.split{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:100px;
    gap:60px;
}
.split .text{
    flex:1;
    text-align:left;
}
.split h2{
    font-size:42px;
    margin-bottom:20px;
}
.split p{
    color:#6e6e73;
    font-size:18px;
}
.split .visual{
    flex:1;
    height:320px;
    border-radius:30px;
    background:linear-gradient(135deg,#000,#444);
    box-shadow:0 20px 60px rgba(0,0,0,.2);
}

/* ===== 卡片 ===== */
.section{margin-top:140px}
.section h2{font-size:44px;margin-bottom:20px}
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
    margin-top:60px;
}
.card{
    padding:40px;
    border-radius:24px;
    background:white;
    text-align:left;
    box-shadow:0 10px 30px rgba(0,0,0,.05);
    transition:.4s;
}
.card:hover{
    transform:translateY(-10px);
    box-shadow:0 25px 60px rgba(0,0,0,.12);
}

/* ===== 渐入动画 ===== */
.fade{opacity:0;transform:translateY(30px);transition:.8s}
.fade.show{opacity:1;transform:translateY(0)}

/* ===== 光标光效 ===== */
.cursor{
    position:fixed;
    width:500px;
    height:500px;
    background:radial-gradient(circle,rgba(0,113,227,.08),transparent 70%);
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:-1;
}

/* ===== 深色模式 ===== */
@media (prefers-color-scheme: dark){
body{background:#000;color:#f5f5f7}

}

@media(max-width:768px){
.hero h1{font-size:60px}
.split{flex-direction:column}
}
</style>
</head>

<canvas id="particleCanvas" style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:-1;background:transparent;"></canvas>
<script>
const canvas = document.getElementById("particleCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2 + 1,
    speedX: Math.random() * 1 - 0.5,
    speedY: Math.random() * 1 - 0.5,
    color: ["#0071e3","#ff2d55","#34c759","#af52de","#ff9500"][Math.floor(Math.random()*5)]
  });
}

// 粒子连线效果
function connect(){
    for(let a=0;a<particles.length;a++){
        for(let b=a;b<particles.length;b++){
            let dx=particles[a].x-particles[b].x;
            let dy=particles[a].y-particles[b].y;
            let dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<120){
                ctx.strokeStyle=particles[a].color;
                ctx.globalAlpha=0.12;
                ctx.lineWidth=0.5;
                ctx.beginPath();
                ctx.moveTo(particles[a].x,particles[a].y);
                ctx.lineTo(particles[b].x,particles[b].y);
                ctx.stroke();
            }
        }
    }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    p.x += p.speedX;
    p.y += p.speedY;
    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
  });
  connect();
  requestAnimationFrame(draw);
}
draw();
</script>

<script>
const obs=new IntersectionObserver(e=>{
e.forEach(i=>i.isIntersecting&&i.target.classList.add('show'))
})
document.querySelectorAll('.fade').forEach(el=>obs.observe(el))

window.addEventListener('scroll',()=>{
nav.classList.toggle('scrolled',window.scrollY>20)
})

const cursor=document.getElementById('cursor')
let mx=0,my=0,cx=0,cy=0
addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY})
function loop(){
cx+=(mx-cx)*0.1
cy+=(my-cy)*0.1
cursor.style.left=cx+'px'
cursor.style.top=cy+'px'
requestAnimationFrame(loop)
}
loop()

document.querySelectorAll('a').forEach(a=>{
a.addEventListener('click',e=>{
if(a.href.includes('#')) return
 e.preventDefault()
 document.body.style.opacity=0
 setTimeout(()=>location.href=a.href,400)
})
})
</script>
